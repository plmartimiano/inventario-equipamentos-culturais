<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Técnico - Completo e Total</title>
    <!-- Google API Script -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'apple-system, BlinkMacSystemFont, Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea #764ba2); padding: 10px; }
        header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .content { display: none; max-height: 90vh; overflow-y: auto; }
        .content.active { display: block; }
        .equipamento-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .section-title { font-size: 16px; font-weight: bold; margin-top: 15px; margin-bottom: 10px; color: #333; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #555; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1); }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #45a049; }
        .menu-btn { width: 100%; text-align: left; padding: 10px; margin-bottom: 5px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .menu-btn:hover { background: #5568d3; }
    </style>
</head>
<body>
    <header>
        <h1>🎭 Inventário de Equipamentos Culturais</h1>
        <button class="menu-btn" onclick="showTab('menu')">← Menu Principal</button>
    </header>

    <!-- MENU PRINCIPAL -->
    <div id="menu" class="content active">
        <div class="equipamento-card">
            <h2 style="margin-bottom: 15px;">Selecione o Equipamento:</h2>
            <button class="menu-btn" onclick="showTab('teatro')">🎭 Teatro</button>
            <button class="menu-btn" onclick="showTab('auditorio')">🎤 Auditório</button>
            <button class="menu-btn" onclick="showTab('cinema')">🎬 Cinema</button>
        </div>
    </div>

    <!-- TEATRO -->
    <div id="teatro" class="content">
        <button class="btn" style="background: #999; color: white; margin-bottom: 15px;" onclick="showTab('menu')">← Voltar</button>
        <div class="equipamento-card">
            <h3>🎭 Inventário - Teatro</h3>
            
            <div class="section-title">📌 Identificação</div>
            <div class="form-group"><label>Nome do Teatro</label><input type="text" id="teatro-nome" placeholder="Nome"></div>
            <div class="form-group"><label>Endereço</label><textarea id="teatro-endereco" placeholder="Endereço"></textarea></div>
            <div class="form-group"><label>Telefone</label><input type="text" id="teatro-telefone" placeholder="(00) 0000-0000"></div>
            <div class="form-group"><label>Email</label><input type="email" id="teatro-email" placeholder="email@example.com"></div>
            
            <div class="section-title">📸 Fotos</div>
            <div class="form-group"><label>Selecione Fotos (até 5)</label><input type="file" id="teatro-fotos" multiple accept="image/*"></div>
            
            <div class="section-title">📄 Documentos</div>
            <div class="form-group"><label>Selecione Documentos (PDF, DOC, etc)</label><input type="file" id="teatro-documentos" multiple></div>
            
            <button class="btn btn-success" onclick="saveFormTeatro()">✓ SALVAR TEATRO</button>
        </div>
    </div>

    <!-- AUDITÓRIO -->
    <div id="auditorio" class="content">
        <button class="btn" style="background: #999; color: white; margin-bottom: 15px;" onclick="showTab('menu')">← Voltar</button>
        <div class="equipamento-card">
            <h3>🎤 Inventário - Auditório</h3>
            
            <div class="section-title">📌 Identificação</div>
            <div class="form-group"><label>Nome do Auditório</label><input type="text" id="auditorio-nome" placeholder="Nome"></div>
            <div class="form-group"><label>Endereço</label><textarea id="auditorio-endereco" placeholder="Endereço"></textarea></div>
            <div class="form-group"><label>Telefone</label><input type="text" id="auditorio-telefone" placeholder="(00) 0000-0000"></div>
            <div class="form-group"><label>Email</label><input type="email" id="auditorio-email" placeholder="email@example.com"></div>
            
            <div class="section-title">📸 Fotos</div>
            <div class="form-group"><label>Selecione Fotos</label><input type="file" id="auditorio-fotos" multiple accept="image/*"></div>
            
            <div class="section-title">📄 Documentos</div>
            <div class="form-group"><label>Selecione Documentos</label><input type="file" id="auditorio-documentos" multiple></div>
            
            <button class="btn btn-success" onclick="saveFormAuditorio()">✓ SALVAR AUDITÓRIO</button>
        </div>
    </div>

    <!-- CINEMA -->
    <div id="cinema" class="content">
        <button class="btn" style="background: #999; color: white; margin-bottom: 15px;" onclick="showTab('menu')">← Voltar</button>
        <div class="equipamento-card">
            <h3>🎬 Inventário - Cinema</h3>
            
            <div class="section-title">📌 Identificação</div>
            <div class="form-group"><label>Nome do Cinema</label><input type="text" id="cinema-nome" placeholder="Nome"></div>
            <div class="form-group"><label>Endereço</label><textarea id="cinema-endereco" placeholder="Endereço"></textarea></div>
            <div class="form-group"><label>Telefone</label><input type="text" id="cinema-telefone" placeholder="(00) 0000-0000"></div>
            <div class="form-group"><label>Email</label><input type="email" id="cinema-email" placeholder="email@example.com"></div>
            
            <div class="section-title">📸 Fotos</div>
            <div class="form-group"><label>Selecione Fotos</label><input type="file" id="cinema-fotos" multiple accept="image/*"></div>
            
            <div class="section-title">📄 Documentos</div>
            <div class="form-group"><label>Selecione Documentos</label><input type="file" id="cinema-documentos" multiple></div>
            
            <button class="btn btn-success" onclick="saveFormCinema()">✓ SALVAR CINEMA</button>
        </div>
    </div>

    <!-- ========================================
         SISTEMA DE UPLOAD PARA GOOGLE DRIVE
         ======================================== -->
    <script>
        const PASTA_PARENT_ID = '1GRA91-gmzF7gev_9IghyhZckGajnsEzB';
        const API_URL = 'https://inventario-equipamentos-paulo.vercel.app/api/uploadGoogleDrive';
        const pastasCache = JSON.parse(localStorage.getItem('pastasCache') || '{}');

        function showTab(tabName) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        function showMsg(msg) {
            alert(msg);
        }

        // ========================================
        // CRIAR PASTA NO GOOGLE
        // ========================================
        async function criarPastaNoGoogle(nomePasta, pastaParentId) {
            try {
                const chaveCache = `${pastaParentId}_${nomePasta}`;
                if (pastasCache[chaveCache]) {
                    console.log(`✓ Pasta ${nomePasta} já existe (cache)`);
                    return pastasCache[chaveCache];
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        acao: 'criar-pasta',
                        nomePasta: nomePasta,
                        pastaParentId: pastaParentId
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const resultado = await response.json();

                if (resultado.sucesso && resultado.pastaId) {
                    pastasCache[chaveCache] = resultado.pastaId;
                    localStorage.setItem('pastasCache', JSON.stringify(pastasCache));
                    console.log(`✓ Pasta criada: ${nomePasta}`);
                    return resultado.pastaId;
                } else {
                    throw new Error(resultado.erro || 'Erro ao criar pasta');
                }
            } catch (erro) {
                console.error(`✗ Erro ao criar pasta ${nomePasta}:`, erro.message);
                throw erro;
            }
        }

        // ========================================
        // FAZER UPLOAD DE ARQUIVO
        // ========================================
        async function uploadArquivoParaGoogle(arquivo, nomeArquivo, pastaId) {
            try {
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const resultado = reader.result.split(',')[1];
                        resolve(resultado);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(arquivo);
                });

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        acao: 'upload',
                        nomeArquivo: nomeArquivo,
                        conteudoBase64: base64,
                        pastaId: pastaId
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const resultado = await response.json();

                if (resultado.sucesso && resultado.link) {
                    console.log(`✓ Arquivo enviado: ${nomeArquivo}`);
                    return resultado.link;
                } else {
                    throw new Error(resultado.erro || 'Erro ao fazer upload');
                }
            } catch (erro) {
                console.error(`✗ Erro ao fazer upload:`, erro.message);
                throw erro;
            }
        }

        // ========================================
        // UPLOAD DE FOTOS
        // ========================================
        async function uploadFotoParaGoogleDrive(arquivo, nomeArquivo, tipoEquipamento) {
            try {
                console.log(`📤 Iniciando upload: ${nomeArquivo}`);

                const nomePastaTipo = `Equipamentos${tipoEquipamento.charAt(0).toUpperCase() + tipoEquipamento.slice(1)}`;
                const pastaTypeId = await criarPastaNoGoogle(nomePastaTipo, PASTA_PARENT_ID);

                const pastaFotosId = await criarPastaNoGoogle('Fotos', pastaTypeId);

                const link = await uploadArquivoParaGoogle(arquivo, nomeArquivo, pastaFotosId);

                console.log(`✅ Upload concluído! Link: ${link}`);
                return link;

            } catch (erro) {
                console.error(`❌ Erro no upload:`, erro.message);
                showMsg(`⚠️ Erro ao enviar arquivo: ${erro.message}`);
                return null;
            }
        }

        // ========================================
        // UPLOAD DE DOCUMENTOS
        // ========================================
        async function uploadDocumentoParaGoogleDrive(arquivo, nomeArquivo, tipoEquipamento) {
            try {
                console.log(`📤 Iniciando upload de documento: ${nomeArquivo}`);

                const nomePastaTipo = `Equipamentos${tipoEquipamento.charAt(0).toUpperCase() + tipoEquipamento.slice(1)}`;
                const pastaTypeId = await criarPastaNoGoogle(nomePastaTipo, PASTA_PARENT_ID);

                const pastaDocumentosId = await criarPastaNoGoogle('Documentos', pastaTypeId);

                const link = await uploadArquivoParaGoogle(arquivo, nomeArquivo, pastaDocumentosId);

                console.log(`✅ Documento enviado! Link: ${link}`);
                return link;

            } catch (erro) {
                console.error(`❌ Erro ao enviar documento:`, erro.message);
                showMsg(`⚠️ Erro ao enviar documento: ${erro.message}`);
                return null;
            }
        }

        // ========================================
        // FUNÇÕES DE SALVAMENTO
        // ========================================
        async function saveFormTeatro() {
            const nome = document.getElementById('teatro-nome').value;
            if (!nome) {
                showMsg('⚠️ Preencha o nome do teatro!');
                return;
            }

            showMsg('⏳ Processando fotos e documentos...');

            const fotosInput = document.getElementById('teatro-fotos');
            const documentosInput = document.getElementById('teatro-documentos');
            const fotos = [];
            const documentos = [];

            // Upload de fotos
            if (fotosInput.files.length > 0) {
                for (let i = 0; i < fotosInput.files.length; i++) {
                    const arquivo = fotosInput.files[i];
                    const nomeArquivo = `${nome}_Foto_${i + 1}_${Date.now()}.jpg`;
                    const link = await uploadFotoParaGoogleDrive(arquivo, nomeArquivo, 'teatro');
                    if (link) fotos.push(link);
                }
            }

            // Upload de documentos
            if (documentosInput.files.length > 0) {
                for (let i = 0; i < documentosInput.files.length; i++) {
                    const arquivo = documentosInput.files[i];
                    const nomeArquivo = `${nome}_Doc_${i + 1}_${Date.now()}${arquivo.name.substring(arquivo.name.lastIndexOf('.'))}`;
                    const link = await uploadDocumentoParaGoogleDrive(arquivo, nomeArquivo, 'teatro');
                    if (link) documentos.push(link);
                }
            }

            showMsg(`✅ Teatro salvo com sucesso! Fotos: ${fotos.length}, Documentos: ${documentos.length}`);
            
            // Limpar formulário
            document.getElementById('teatro-nome').value = '';
            document.getElementById('teatro-endereco').value = '';
            document.getElementById('teatro-telefone').value = '';
            document.getElementById('teatro-email').value = '';
            document.getElementById('teatro-fotos').value = '';
            document.getElementById('teatro-documentos').value = '';
            
            setTimeout(() => showTab('menu'), 1500);
        }

        async function saveFormAuditorio() {
            const nome = document.getElementById('auditorio-nome').value;
            if (!nome) {
                showMsg('⚠️ Preencha o nome do auditório!');
                return;
            }

            showMsg('⏳ Processando fotos e documentos...');

            const fotosInput = document.getElementById('auditorio-fotos');
            const documentosInput = document.getElementById('auditorio-documentos');
            const fotos = [];
            const documentos = [];

            if (fotosInput.files.length > 0) {
                for (let i = 0; i < fotosInput.files.length; i++) {
                    const arquivo = fotosInput.files[i];
                    const nomeArquivo = `${nome}_Foto_${i + 1}_${Date.now()}.jpg`;
                    const link = await uploadFotoParaGoogleDrive(arquivo, nomeArquivo, 'auditorio');
                    if (link) fotos.push(link);
                }
            }

            if (documentosInput.files.length > 0) {
                for (let i = 0; i < documentosInput.files.length; i++) {
                    const arquivo = documentosInput.files[i];
                    const nomeArquivo = `${nome}_Doc_${i + 1}_${Date.now()}${arquivo.name.substring(arquivo.name.lastIndexOf('.'))}`;
                    const link = await uploadDocumentoParaGoogleDrive(arquivo, nomeArquivo, 'auditorio');
                    if (link) documentos.push(link);
                }
            }

            showMsg(`✅ Auditório salvo! Fotos: ${fotos.length}, Documentos: ${documentos.length}`);
            document.getElementById('auditorio-nome').value = '';
            document.getElementById('auditorio-endereco').value = '';
            document.getElementById('auditorio-telefone').value = '';
            document.getElementById('auditorio-email').value = '';
            document.getElementById('auditorio-fotos').value = '';
            document.getElementById('auditorio-documentos').value = '';
            
            setTimeout(() => showTab('menu'), 1500);
        }

        async function saveFormCinema() {
            const nome = document.getElementById('cinema-nome').value;
            if (!nome) {
                showMsg('⚠️ Preencha o nome do cinema!');
                return;
            }

            showMsg('⏳ Processando fotos e documentos...');

            const fotosInput = document.getElementById('cinema-fotos');
            const documentosInput = document.getElementById('cinema-documentos');
            const fotos = [];
            const documentos = [];

            if (fotosInput.files.length > 0) {
                for (let i = 0; i < fotosInput.files.length; i++) {
                    const arquivo = fotosInput.files[i];
                    const nomeArquivo = `${nome}_Foto_${i + 1}_${Date.now()}.jpg`;
                    const link = await uploadFotoParaGoogleDrive(arquivo, nomeArquivo, 'cinema');
                    if (link) fotos.push(link);
                }
            }

            if (documentosInput.files.length > 0) {
                for (let i = 0; i < documentosInput.files.length; i++) {
                    const arquivo = documentosInput.files[i];
                    const nomeArquivo = `${nome}_Doc_${i + 1}_${Date.now()}${arquivo.name.substring(arquivo.name.lastIndexOf('.'))}`;
                    const link = await uploadDocumentoParaGoogleDrive(arquivo, nomeArquivo, 'cinema');
                    if (link) documentos.push(link);
                }
            }

            showMsg(`✅ Cinema salvo! Fotos: ${fotos.length}, Documentos: ${documentos.length}`);
            document.getElementById('cinema-nome').value = '';
            document.getElementById('cinema-endereco').value = '';
            document.getElementById('cinema-telefone').value = '';
            document.getElementById('cinema-email').value = '';
            document.getElementById('cinema-fotos').value = '';
            document.getElementById('cinema-documentos').value = '';
            
            setTimeout(() => showTab('menu'), 1500);
        }
    </script>
</body>
</html>
